<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Market Report</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #f0c040;
    --accent2: #4af0a0;
    --danger: #f05050;
    --text: #e8e8f0;
    --muted: #666680;
    --card: #14141e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(240,192,64,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,192,64,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .header-left h1 span {
    color: var(--accent);
  }

  .header-left .subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .generate-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 12px 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .generate-btn:hover:not(:disabled) {
    background: #ffd060;
    transform: translateY(-1px);
  }

  .generate-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Status bar */
  .status-bar {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  .status-dot.live {
    background: var(--accent2);
    box-shadow: 0 0 6px var(--accent2);
    animation: pulse 2s infinite;
  }

  .status-dot.loading {
    background: var(--accent);
    animation: pulse 0.8s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    border: 1px dashed var(--border);
  }

  .empty-state .big-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-state h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .empty-state p {
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.6;
  }

  /* Loading state */
  .loading-state {
    display: none;
    padding: 60px 24px;
    text-align: center;
  }

  .loading-state.active { display: block; }

  .loading-bar-wrap {
    width: 100%;
    max-width: 400px;
    margin: 24px auto 16px;
    height: 2px;
    background: var(--border);
    overflow: hidden;
  }

  .loading-bar {
    height: 100%;
    background: var(--accent);
    animation: loadbar 2s ease-in-out infinite;
  }

  @keyframes loadbar {
    0% { width: 0%; margin-left: 0; }
    50% { width: 60%; margin-left: 20%; }
    100% { width: 0%; margin-left: 100%; }
  }

  .loading-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: fade 1s ease-in-out infinite alternate;
  }

  @keyframes fade { from { opacity: 0.4; } to { opacity: 1; } }

  /* Report output */
  #report-output {
    display: none;
    animation: slideUp 0.4s ease;
  }

  #report-output.active { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Section headers */
  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Highlight cards (indices, macro) */
  .highlight-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1px;
    background: var(--border);
    margin-bottom: 40px;
  }

  .highlight-card {
    background: var(--card);
    padding: 20px 18px;
  }

  .highlight-card .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .highlight-card .value {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
  }

  .highlight-card .change {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    margin-top: 3px;
  }

  .up { color: var(--accent2); }
  .down { color: var(--danger); }
  .neutral { color: var(--muted); }

  /* Stock rows */
  .stock-section {
    margin-bottom: 40px;
  }

  .stock-row {
    display: grid;
    grid-template-columns: 1fr 2fr auto;
    gap: 16px;
    align-items: start;
    padding: 18px 0;
    border-bottom: 1px solid var(--border);
  }

  .stock-row:last-child { border-bottom: none; }

  .stock-ticker {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--accent);
  }

  .stock-name {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .stock-analysis {
    font-size: 0.82rem;
    line-height: 1.6;
    color: #b0b0c8;
  }

  .stock-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 1px;
    padding: 3px 8px;
    text-transform: uppercase;
    white-space: nowrap;
    align-self: start;
    margin-top: 2px;
  }

  .badge-up { background: rgba(74,240,160,0.1); color: var(--accent2); border: 1px solid rgba(74,240,160,0.2); }
  .badge-down { background: rgba(240,80,80,0.1); color: var(--danger); border: 1px solid rgba(240,80,80,0.2); }
  .badge-watch { background: rgba(240,192,64,0.1); color: var(--accent); border: 1px solid rgba(240,192,64,0.2); }

  /* Summary / narrative */
  .narrative-block {
    background: var(--card);
    border-left: 3px solid var(--accent);
    padding: 24px;
    margin-bottom: 40px;
  }

  .narrative-block p {
    font-size: 0.88rem;
    line-height: 1.8;
    color: #c0c0d8;
  }

  /* Sector overview */
  .sector-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px;
    margin-bottom: 40px;
  }

  .sector-item {
    background: var(--card);
    padding: 14px 12px;
    border: 1px solid var(--border);
  }

  .sector-item .s-name {
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .sector-item .s-perf {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    font-weight: 500;
  }

  /* Footer */
  .footer {
    margin-top: 60px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* Error */
  .error-block {
    background: rgba(240,80,80,0.08);
    border: 1px solid rgba(240,80,80,0.2);
    padding: 20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--danger);
    display: none;
  }

  .error-block.active { display: block; }

  @media (max-width: 600px) {
    .header { flex-direction: column; gap: 16px; }
    .header-left h1 { font-size: 1.8rem; }
    .stock-row { grid-template-columns: 1fr; }
    .stock-badge { align-self: start; width: fit-content; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="header-left">
      <h1>Morning<br><span>Market</span> Report</h1>
      <div class="subtitle" id="date-label">— Loading date...</div>
    </div>
    <button class="generate-btn" id="gen-btn" onclick="generateReport()">
      ▶ Generate Report
    </button>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Klaar om rapport te genereren</span>
  </div>

  <div class="error-block" id="error-block"></div>

  <!-- Empty state -->
  <div id="empty-state" class="empty-state">
    <div class="big-icon">📊</div>
    <h2>Geen rapport geladen</h2>
    <p>Klik op "Generate Report" om een live AI-marktanalyse<br>te starten voor de huidige handelsdag.</p>
  </div>

  <!-- Loading state -->
  <div class="loading-state" id="loading-state">
    <div class="loading-label" id="loading-label">Marktdata ophalen...</div>
    <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  </div>

  <!-- Report -->
  <div id="report-output"></div>

  <div class="footer">
    <span>MORNING MARKET REPORT — AI-GENERATED</span>
    <span id="footer-time">—</span>
  </div>

</div>

<script>
const SECTIONS = [
  "S&P 500 & grote indices ophalen...",
  "Macro-economisch klimaat analyseren...",
  "Top stijgers identificeren...",
  "Zwakke aandelen filteren...",
  "Sectorporties evalueren...",
  "Rapport samenstellen..."
];

function updateDate() {
  const now = new Date();
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('date-label').textContent = `— ${now.toLocaleDateString('nl-NL', opts)}`;
  document.getElementById('footer-time').textContent = `Gegenereerd om ${now.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' })}`;
}

updateDate();

function setStatus(type, text) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot ' + type;
  document.getElementById('status-text').textContent = text;
}

function showError(msg) {
  const el = document.getElementById('error-block');
  el.textContent = '⚠ ' + msg;
  el.classList.add('active');
}

async function generateReport() {
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('report-output').classList.remove('active');
  document.getElementById('error-block').classList.remove('active');

  const loadingEl = document.getElementById('loading-state');
  const labelEl = document.getElementById('loading-label');
  loadingEl.classList.add('active');

  setStatus('loading', 'AI analyseert de markten...');

  // Animate loading labels
  let si = 0;
  const interval = setInterval(() => {
    labelEl.textContent = SECTIONS[si % SECTIONS.length];
    si++;
  }, 1800);

  const today = new Date().toLocaleDateString('nl-NL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  const systemPrompt = `Je bent een professionele financieel marktanalist. Je genereert elke ochtend een beknopt maar inzichtelijk marktrapport in het Nederlands. 
Je gebruikt web search om actuele marktdata op te halen. Geef concrete informatie: echte koersen, echte percentages, echte bedrijfsnamen.
Schrijf analytisch maar toegankelijk. Geen wollige taal. Geef altijd je mening over het toekomstperspectief.

Reageer UITSLUITEND met een geldig JSON object. Geen markdown, geen backticks, geen uitleg buiten de JSON.

JSON structuur:
{
  "summary": "2-3 zinnen over het algemene marktsentiment vandaag",
  "indices": [
    { "name": "S&P 500", "value": "5800", "change": "+0.4%", "direction": "up" },
    { "name": "Nasdaq", "value": "18200", "change": "-0.2%", "direction": "down" },
    { "name": "Dow Jones", "value": "42000", "change": "+0.1%", "direction": "up" },
    { "name": "AEX", "value": "900", "change": "+0.3%", "direction": "up" },
    { "name": "BEL20", "value": "4100", "change": "-0.1%", "direction": "down" }
  ],
  "macro": [
    { "label": "10Y Rente VS", "value": "4.3%", "change": "+2bp", "direction": "up" },
    { "label": "EUR/USD", "value": "1.085", "change": "-0.1%", "direction": "down" },
    { "label": "Goud", "value": "$2400", "change": "+0.5%", "direction": "up" },
    { "label": "VIX (Angst)", "value": "18.2", "change": "-1.1", "direction": "down" }
  ],
  "risers": [
    {
      "ticker": "NVDA",
      "name": "NVIDIA Corporation",
      "change": "+4.2%",
      "analysis": "Sterk kwartaalrapport met recordwinst in datacenters. AI-vraag blijft accelereren. Momentum intact.",
      "outlook": "bullish"
    },
    {
      "ticker": "ASML",
      "name": "ASML Holding",
      "change": "+2.8%",
      "analysis": "Orders overtreffen verwachtingen. Monopoliepositie in EUV-lithografie blijft onaangetast.",
      "outlook": "bullish"
    },
    {
      "ticker": "META",
      "name": "Meta Platforms",
      "change": "+1.9%",
      "analysis": "Reels-advertentie-inkomsten groeien sneller dan verwacht. AI-investeringen beginnen vruchten af te werpen.",
      "outlook": "bullish"
    }
  ],
  "fallers": [
    {
      "ticker": "INTC",
      "name": "Intel Corporation",
      "change": "-3.1%",
      "analysis": "Verlies van marktaandeel in server-CPUs aan AMD en ARM. Structurele problemen in foundry-divisie.",
      "outlook": "bearish"
    },
    {
      "ticker": "PFE",
      "name": "Pfizer Inc.",
      "change": "-1.8%",
      "analysis": "Pipeline-teleurstelling na fase-3 falen. Post-COVID-omzetdaling zet door zonder duidelijke opvolger.",
      "outlook": "bearish"
    }
  ],
  "sectors": [
    { "name": "Technologie", "perf": "+1.2%", "direction": "up" },
    { "name": "Energie", "perf": "-0.8%", "direction": "down" },
    { "name": "Gezondheidszorg", "perf": "-0.3%", "direction": "down" },
    { "name": "Financiën", "perf": "+0.5%", "direction": "up" },
    { "name": "Consument", "perf": "+0.2%", "direction": "up" },
    { "name": "Vastgoed", "perf": "-0.6%", "direction": "down" },
    { "name": "Utilities", "perf": "+0.1%", "direction": "neutral" },
    { "name": "Industrie", "perf": "+0.4%", "direction": "up" }
  ],
  "watchlist": [
    {
      "ticker": "TSLA",
      "name": "Tesla Inc.",
      "change": "+0.8%",
      "analysis": "Koers consolideert na recente daling. Leveringscijfers Q2 worden deze week verwacht. Kritiek punt voor richting.",
      "outlook": "watch"
    }
  ]
}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        system: systemPrompt,
        messages: [{
          role: "user",
          content: `Genereer het morning market rapport voor ${today}. Gebruik web search om actuele data op te halen voor de S&P 500, Nasdaq, Dow Jones, AEX, BEL20, interessante stijgers met toekomstperspectief, dalende aandelen met fundamentele problemen, sectorprestaties en macro-indicatoren. Geef realistische, actuele cijfers.`
        }]
      })
    });

    clearInterval(interval);

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `API error ${response.status}`);
    }

    const data = await response.json();

    // Extract text from response (may include tool use blocks)
    const textBlock = data.content.find(b => b.type === 'text');
    if (!textBlock) throw new Error('Geen tekstrespons ontvangen van de API.');

    let raw = textBlock.text.trim();
    raw = raw.replace(/```json|```/g, '').trim();

    const report = JSON.parse(raw);

    loadingEl.classList.remove('active');
    renderReport(report);
    setStatus('live', `Rapport gegenereerd — ${new Date().toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' })}`);
    updateDate();

  } catch (e) {
    clearInterval(interval);
    loadingEl.classList.remove('active');
    document.getElementById('empty-state').style.display = 'block';
    showError(`Fout bij genereren: ${e.message}`);
    setStatus('', 'Fout opgetreden');
  }

  btn.disabled = false;
}

function dirClass(dir) {
  if (dir === 'up') return 'up';
  if (dir === 'down') return 'down';
  return 'neutral';
}

function badgeClass(outlook) {
  if (outlook === 'bullish') return 'badge-up';
  if (outlook === 'bearish') return 'badge-down';
  return 'badge-watch';
}

function badgeLabel(outlook) {
  if (outlook === 'bullish') return '↑ Bullish';
  if (outlook === 'bearish') return '↓ Bearish';
  return '◎ Watch';
}

function renderReport(r) {
  let html = '';

  // Summary narrative
  html += `<div class="section-label">Dagelijks overzicht</div>`;
  html += `<div class="narrative-block"><p>${r.summary}</p></div>`;

  // Indices
  if (r.indices?.length) {
    html += `<div class="section-label">Belangrijke indices</div>`;
    html += `<div class="highlight-grid">`;
    r.indices.forEach(idx => {
      html += `<div class="highlight-card">
        <div class="label">${idx.name}</div>
        <div class="value ${dirClass(idx.direction)}">${idx.value}</div>
        <div class="change ${dirClass(idx.direction)}">${idx.change}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Macro
  if (r.macro?.length) {
    html += `<div class="section-label">Macro-indicatoren</div>`;
    html += `<div class="highlight-grid">`;
    r.macro.forEach(m => {
      html += `<div class="highlight-card">
        <div class="label">${m.label}</div>
        <div class="value ${dirClass(m.direction)}">${m.value}</div>
        <div class="change ${dirClass(m.direction)}">${m.change}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Risers
  if (r.risers?.length) {
    html += `<div class="section-label">Interessante stijgers</div>`;
    html += `<div class="stock-section">`;
    r.risers.forEach(s => {
      html += `<div class="stock-row">
        <div>
          <div class="stock-ticker">${s.ticker}</div>
          <div class="stock-name">${s.name}</div>
          <div class="up" style="font-family:'IBM Plex Mono',monospace;font-size:0.8rem;margin-top:4px;">${s.change}</div>
        </div>
        <div class="stock-analysis">${s.analysis}</div>
        <div class="stock-badge ${badgeClass(s.outlook)}">${badgeLabel(s.outlook)}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Fallers
  if (r.fallers?.length) {
    html += `<div class="section-label">Aandelen onder druk</div>`;
    html += `<div class="stock-section">`;
    r.fallers.forEach(s => {
      html += `<div class="stock-row">
        <div>
          <div class="stock-ticker">${s.ticker}</div>
          <div class="stock-name">${s.name}</div>
          <div class="down" style="font-family:'IBM Plex Mono',monospace;font-size:0.8rem;margin-top:4px;">${s.change}</div>
        </div>
        <div class="stock-analysis">${s.analysis}</div>
        <div class="stock-badge ${badgeClass(s.outlook)}">${badgeLabel(s.outlook)}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Watchlist
  if (r.watchlist?.length) {
    html += `<div class="section-label">In de gaten houden</div>`;
    html += `<div class="stock-section">`;
    r.watchlist.forEach(s => {
      html += `<div class="stock-row">
        <div>
          <div class="stock-ticker">${s.ticker}</div>
          <div class="stock-name">${s.name}</div>
          <div class="neutral" style="font-family:'IBM Plex Mono',monospace;font-size:0.8rem;margin-top:4px;">${s.change}</div>
        </div>
        <div class="stock-analysis">${s.analysis}</div>
        <div class="stock-badge ${badgeClass(s.outlook)}">${badgeLabel(s.outlook)}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Sectors
  if (r.sectors?.length) {
    html += `<div class="section-label">Sectorprestaties</div>`;
    html += `<div class="sector-grid">`;
    r.sectors.forEach(s => {
      html += `<div class="sector-item">
        <div class="s-name">${s.name}</div>
        <div class="s-perf ${dirClass(s.direction)}">${s.perf}</div>
      </div>`;
    });
    html += `</div>`;
  }

  const out = document.getElementById('report-output');
  out.innerHTML = html;
  out.classList.add('active');
  out.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
